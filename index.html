<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Lift Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--surface3:#252525;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#edeae3;--muted:#555550;--muted2:#9a9890;
  --accent:#d4f54e;--accent-dim:rgba(212,245,78,0.09);--accent-text:#0d0d0d;
  --danger:#f05050;--danger-dim:rgba(240,80,80,0.1);
  --warn:#f0a030;--warn-dim:rgba(240,160,48,0.09);
  --r:12px;--r-sm:8px;--r-xs:6px;
  --mono:'DM Mono',monospace;--disp:'Syne',sans-serif;
}
[data-theme="light"]{
  --bg:#f0ede6;--surface:#fff;--surface2:#f5f2eb;--surface3:#eae7e0;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);
  --text:#1a1a17;--muted:#b0ada6;--muted2:#888580;--accent-text:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--disp);min-height:100vh;transition:background .2s,color .2s}
#app{max-width:430px;margin:0 auto;padding-bottom:72px}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:0.5px solid var(--border);display:flex;z-index:100;padding:10px 0 max(10px,env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:2px 0}
.nav-label{font-size:11px;font-family:var(--mono);color:var(--muted);transition:color .15s;letter-spacing:.03em}
.nav-item.active .nav-label{color:var(--accent)}
.nav-bar{width:20px;height:2px;border-radius:99px;background:transparent;transition:background .15s}
.nav-item.active .nav-bar{background:var(--accent)}

.hdr{padding:1.5rem 1.25rem 0.85rem;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:0.5px solid var(--border)}
.logo{font-size:21px;font-weight:800;letter-spacing:-0.04em}
.logo em{color:var(--accent);font-style:normal}
.hdr-meta{font-size:11px;font-family:var(--mono);color:var(--muted)}

.screen{display:none;padding:1.25rem;animation:fadeUp .15s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

.slabel{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.divider{height:.5px;background:var(--border);margin:16px 0}
.empty{text-align:center;padding:2.5rem 0;color:var(--muted);font-size:12px;font-family:var(--mono)}

label{display:block;font-size:10px;font-family:var(--mono);color:var(--muted);margin-bottom:4px;letter-spacing:.07em;text-transform:uppercase}
input[type=number],input[type=text],input[type=date],select{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:var(--mono);font-size:14px;padding:0 12px;height:42px;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent)}
select option{background:var(--surface2)}
input[type=range]{width:100%;height:3px;padding:0;border:none;background:var(--surface3);border-radius:99px;cursor:pointer;accent-color:var(--accent);-webkit-appearance:none;appearance:none;outline:none}

.btn{display:flex;align-items:center;justify-content:center;height:42px;border-radius:var(--r-sm);font-family:var(--mono);font-size:13px;cursor:pointer;border:0.5px solid var(--border2);background:transparent;color:var(--text);transition:background .12s,transform .1s;width:100%}
.btn:active{transform:scale(0.97)}
.btn:hover{background:var(--surface2)}
.btn.accent{background:var(--accent);color:var(--accent-text);border-color:transparent;font-weight:500}
.btn.accent:hover{opacity:.88}
.btn.sm{height:32px;font-size:12px;padding:0 12px;width:auto}
.btn.xs{height:28px;font-size:11px;padding:0 10px;width:auto}
.btn.ghost{color:var(--muted);border-color:transparent}
.btn.ghost:hover{color:var(--text);background:var(--surface2)}
.btn.danger{color:var(--danger);border-color:rgba(240,80,80,.2)}
.btn.danger:hover{background:var(--danger-dim)}
.field{margin-bottom:12px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

.notif-bar{margin-bottom:12px;display:flex;flex-direction:column;gap:6px}
.notif{display:flex;align-items:flex-start;gap:10px;background:var(--warn-dim);border:0.5px solid rgba(240,160,48,.25);border-radius:var(--r-sm);padding:10px 12px}
.notif-dot{width:6px;height:6px;border-radius:50%;background:var(--warn);flex-shrink:0;margin-top:4px}
.notif-text{flex:1;font-size:12px;font-family:var(--mono);color:var(--muted2);line-height:1.5}
.notif-lift{color:var(--warn)}
.notif-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;flex-shrink:0;padding:0}

.sess-row{display:flex;gap:8px;margin-bottom:16px}
.sess-row input{flex:1}

.ex-section{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:12px}
.ex-section-title{font-size:13px;font-weight:600;margin-bottom:2px}
.ex-section-last{font-size:11px;font-family:var(--mono);color:var(--muted2);margin-bottom:12px;line-height:1.5}
.ex-section-last span{color:var(--accent)}
.ex-target{font-size:10px;font-family:var(--mono);color:var(--muted);margin-bottom:12px;letter-spacing:.03em}

.set-list{margin-top:10px}
.set-item{display:flex;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border);font-family:var(--mono);font-size:13px;gap:8px}
.set-item:last-child{border-bottom:none}
.set-n{color:var(--muted);min-width:24px;font-size:10px}
.set-val{flex:1}
.set-tag{font-size:10px;padding:2px 6px;border-radius:99px;margin-left:4px;font-family:var(--mono)}
.set-tag.good{background:var(--accent-dim);color:var(--accent)}
.set-tag.low{background:var(--surface3);color:var(--muted)}
.set-del{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0 2px;line-height:1}
.set-del:hover{color:var(--danger)}
.vol-line{font-size:10px;font-family:var(--mono);color:var(--muted);text-align:right;margin-top:6px}

.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.ex-tile{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r-sm);padding:.75rem .9rem .75rem .9rem;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;position:relative;min-height:72px}
.ex-tile:active{transform:scale(0.97)}
.ex-tile.is-active{border-color:var(--accent);background:var(--accent-dim)}
.ex-tile.has-notif{border-color:var(--warn)}
.ex-tile-name{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:3px;padding-right:18px}
.ex-tile-last{font-size:10px;font-family:var(--mono);color:var(--muted2)}
.ex-tile-today{font-size:10px;font-family:var(--mono);color:var(--accent);margin-top:2px}
.tile-badge{position:absolute;top:6px;right:6px;font-size:9px;font-family:var(--mono);padding:2px 5px;border-radius:99px;font-weight:500;letter-spacing:.02em}
.badge-pr{background:var(--accent);color:var(--accent-text)}
.badge-up{background:var(--warn);color:#0d0d0d}
.tile-remove{position:absolute;bottom:6px;right:8px;background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;line-height:1;padding:2px;opacity:0;transition:opacity .15s}
.ex-tile:hover .tile-remove{opacity:1}
.tile-remove:hover{color:var(--danger)}

.add-ex-row{display:flex;gap:8px;margin-bottom:12px}
.add-ex-row input{flex:1;height:38px;font-size:13px}

.sess-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-sm);padding:.85rem 1rem;margin-bottom:8px}
.sess-ex-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sess-ex-name{font-size:13px;font-weight:600}
.sess-sets-ct{font-size:10px;font-family:var(--mono);color:var(--accent)}
.sess-set-line{font-size:11px;font-family:var(--mono);color:var(--muted2);padding:2px 0}
.sess-vol{font-size:10px;font-family:var(--mono);color:var(--muted);text-align:right;margin-top:4px}

.hist-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.hist-head{padding:.85rem 1rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.hist-date{font-size:11px;font-family:var(--mono);color:var(--accent)}
.hist-label{font-size:13px;font-weight:600;margin-top:2px}
.hist-meta{font-size:11px;font-family:var(--mono);color:var(--muted);text-align:right}
.hist-body{border-top:.5px solid var(--border);padding:.85rem 1rem;display:none}
.hist-body.open{display:block}
.hist-ex{margin-bottom:10px}.hist-ex:last-child{margin-bottom:4px}
.hist-ex-name{font-size:12px;font-weight:600;margin-bottom:4px}

.add-row{display:flex;gap:8px;margin-bottom:14px}
.chart-mode-row{display:flex;gap:6px;margin-bottom:14px}
.mode-pill{font-size:11px;font-family:var(--mono);padding:5px 12px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s}
.mode-pill.active{background:var(--accent);color:var(--accent-text);border-color:transparent}
.chart-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:10px}
.cc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
.cc-title{font-size:13px;font-weight:600}
.cc-sub{font-size:10px;font-family:var(--mono);color:var(--muted);margin-bottom:10px}
.cc-stats{display:flex;gap:8px;margin-bottom:12px}
.cc-stat{flex:1;background:var(--surface2);border-radius:var(--r-xs);padding:8px 10px}
.cc-stat-label{font-size:9px;font-family:var(--mono);color:var(--muted);margin-bottom:2px;letter-spacing:.05em;text-transform:uppercase}
.cc-stat-val{font-size:17px;font-weight:700;color:var(--accent)}
.rm-chart{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0;line-height:1}
.rm-chart:hover{color:var(--danger)}

.cat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-pill{font-size:11px;font-family:var(--mono);padding:5px 12px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s}
.cat-pill.active{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.stat-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
.stat-table th{text-align:left;font-size:10px;color:var(--muted);padding:4px 0 10px;font-weight:400;text-transform:uppercase;letter-spacing:.06em}
.stat-table td{padding:8px 0;border-bottom:.5px solid var(--border);vertical-align:middle}
.stat-table tr:last-child td{border-bottom:none}
.td-lift{font-weight:500;font-size:12px;color:var(--text)}
.td-e1rm{color:var(--accent);font-weight:500}
.td-gain.pos{color:var(--accent)}
.td-gain.neg{color:var(--danger)}
.td-sess{color:var(--muted2)}

.s-section{margin-bottom:1.75rem}
.s-title{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:.5px solid var(--border)}
.s-row:last-child{border-bottom:none}
.s-row-label{font-size:13px;color:var(--text)}
.s-row-sub{font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:2px}
.toggle{width:40px;height:22px;border-radius:99px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle.off{background:var(--surface3)}
.toggle::after{content:'';position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:21px}
.toggle.off::after{left:3px}
.swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.swatch.active{border-color:var(--text)}
.lift-cfg{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-sm);padding:.85rem 1rem;margin-bottom:8px}
.lift-cfg-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.lift-cfg-name{font-size:13px;font-weight:600}
.thresh-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--border)}
.thresh-val{font-size:14px;font-family:var(--mono);color:var(--accent);min-width:18px;text-align:right}

#toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--accent);color:var(--accent-text);font-family:var(--mono);font-size:12px;padding:9px 18px;border-radius:99px;transition:transform .25s;z-index:999;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div><div class="logo">Lift<em>Log</em></div></div>
    <div class="hdr-meta" id="hdr-meta">—</div>
  </div>

  <!-- LOG -->
  <div class="screen active" id="scr-log">
    <div class="notif-bar" id="notif-bar"></div>
    <div class="sess-row">
      <input type="date" id="sess-date"/>
      <input type="text" id="sess-label" placeholder="Push A, Legs..."/>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="slabel" style="margin-bottom:0">Exercises</div>
      <button class="btn xs ghost" id="add-ex-btn" onclick="toggleAddEx()" style="font-family:var(--mono);font-size:11px">+ Add</button>
    </div>
    <div id="add-ex-row" style="display:none;margin-bottom:12px">
      <div class="add-ex-row">
        <input type="text" id="log-new-lift" placeholder="Exercise name" list="common-lifts-log"/>
        <datalist id="common-lifts-log">
          <option value="Bench press"><option value="Incline bench"><option value="Overhead press">
          <option value="Squat"><option value="Deadlift"><option value="Romanian deadlift">
          <option value="Leg press"><option value="Bulgarian split squat"><option value="Back extension">
          <option value="Pull-up"><option value="Lat pulldown"><option value="Dumbbell row">
          <option value="Barbell row"><option value="Cable row"><option value="Hip thrust">
          <option value="Dumbbell curl"><option value="Tricep pushdown"><option value="Face pull">
          <option value="Lateral raise"><option value="Leg curl"><option value="Leg extension">
          <option value="Calf raise"><option value="Hack squat"><option value="Chest fly">
        </datalist>
        <button class="btn sm accent" onclick="addLiftFromLog()" style="width:auto;padding:0 14px;flex-shrink:0">Add</button>
      </div>
    </div>

    <div class="ex-grid" id="ex-grid"></div>

    <div id="log-panel" style="display:none">
      <div class="ex-section">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <div>
            <div class="ex-section-title" id="lp-title"></div>
            <div class="ex-target" id="lp-target"></div>
          </div>
          <button class="btn xs ghost" onclick="closePanel()">Done</button>
        </div>
        <div class="ex-section-last" id="lp-last"></div>
        <div class="row2" style="margin-bottom:10px">
          <div><label>Weight (lbs)</label><input type="number" id="lp-w" placeholder="185" min="0" step="2.5" inputmode="decimal"/></div>
          <div><label>Reps</label><input type="number" id="lp-r" placeholder="8" min="1" inputmode="numeric"/></div>
        </div>
        <button class="btn accent" onclick="logSet()">+ Log set</button>
        <div class="set-list" id="lp-sets"></div>
        <div class="vol-line" id="lp-vol"></div>
      </div>
    </div>

    <div class="divider"></div>
    <div class="slabel">Today</div>
    <div id="sess-summary"></div>
  </div>

  <!-- PROGRESS -->
  <div class="screen" id="scr-progress">
    <div class="add-row">
      <select id="dash-select" style="flex:1"><option value="">Add lift to dashboard...</option></select>
      <button class="btn sm" onclick="addChart()" style="width:auto;padding:0 14px">Add</button>
    </div>
    <div class="chart-mode-row">
      <div class="mode-pill active" onclick="setMode('e1rm',this)">e1RM</div>
      <div class="mode-pill" onclick="setMode('volume',this)">Volume</div>
    </div>
    <div id="dash-grid"><div class="empty">Add a lift above to build your dashboard</div></div>
  </div>

  <!-- STATS -->
  <div class="screen" id="scr-stats">
    <div class="cat-row">
      <div class="cat-pill active" onclick="setCat('all',this)">All</div>
      <div class="cat-pill" onclick="setCat('push',this)">Push</div>
      <div class="cat-pill" onclick="setCat('pull',this)">Pull</div>
      <div class="cat-pill" onclick="setCat('legs',this)">Legs</div>
    </div>
    <div id="stats-view"></div>
  </div>

  <!-- SETTINGS -->
  <div class="screen" id="scr-settings">
    <div class="s-section">
      <div class="s-title">Appearance</div>
      <div class="s-row">
        <div><div class="s-row-label">Dark mode</div></div>
        <button class="toggle off" id="theme-tog" onclick="toggleTheme()"></button>
      </div>
      <div style="padding:12px 0 4px">
        <div class="s-row-label" style="font-size:12px;margin-bottom:2px">Accent color</div>
        <div class="swatches" id="swatches"></div>
      </div>
    </div>
    <div class="s-section">
      <div class="s-title">Notifications</div>
      <div class="s-row">
        <div><div class="s-row-label">Weight increase alerts</div><div class="s-row-sub">Notify when you hit your rep ceiling X sessions in a row</div></div>
        <button class="toggle off" id="notif-tog" onclick="toggleNotif()"></button>
      </div>
      <div class="thresh-row">
        <div style="flex:1"><div class="s-row-label" style="font-size:12px">Sessions to trigger</div></div>
        <span class="thresh-val" id="thresh-val">3</span>
        <input type="range" min="2" max="6" step="1" id="thresh-range" oninput="updateThresh()" style="width:90px"/>
      </div>
    </div>
    <div class="s-section">
      <div class="s-title">Exercises</div>
      <div id="lift-cfg-list"></div>
    </div>
    <div class="s-section">
      <div class="s-title">Data</div>
      <div style="display:flex;gap:8px">
        <button class="btn sm" onclick="exportCSV()" style="flex:1">Export CSV</button>
        <button class="btn sm danger" onclick="clearData()" style="flex:1">Clear all data</button>
      </div>
    </div>
  </div>
</div>

<nav class="nav">
  <div class="nav-item active" onclick="goTo('log',this)">
    <div class="nav-bar"></div>
    <div class="nav-label">Log</div>
  </div>
  <div class="nav-item" onclick="goTo('progress',this)">
    <div class="nav-bar"></div>
    <div class="nav-label">Progress</div>
  </div>
  <div class="nav-item" onclick="goTo('stats',this)">
    <div class="nav-bar"></div>
    <div class="nav-label">Stats</div>
  </div>
  <div class="nav-item" onclick="goTo('settings',this)">
    <div class="nav-bar"></div>
    <div class="nav-label">Settings</div>
  </div>
</nav>
<div id="toast"></div>

<script>
const DATA_KEY='ll_data_v3',PREF_KEY='ll_pref_v3',DASH_KEY='ll_dash_v3',DIS_KEY='ll_dis_v3';
const ACCENTS=['#d4f54e','#60d4f5','#f56060','#f5a030','#b060f5','#60f5b0','#f560d4','#e8e8e8'];
const CATS={push:['Bench press','Incline bench','Overhead press'],pull:['Pull-up','Lat pulldown','Dumbbell row','Barbell row','Cable row'],legs:['Squat','Deadlift','Romanian deadlift','Leg press','Bulgarian split squat','Back extension','Hip thrust','Leg curl','Leg extension']};

let data=[],prefs={},dashLifts=[],dismissed=[],activeLift=null,chartMode='e1rm',currentCat='all',charts={};

const DEF={theme:'dark',accent:'#d4f54e',notifOn:true,thresh:3,lifts:[
  {name:'Bench press',repMin:6,repMax:12,step:5},
  {name:'Incline bench',repMin:6,repMax:12,step:5},
  {name:'Overhead press',repMin:6,repMax:12,step:5},
  {name:'Pull-up',repMin:5,repMax:10,step:0},
  {name:'Dumbbell row',repMin:8,repMax:15,step:5},
  {name:'Squat',repMin:5,repMax:10,step:5},
  {name:'Leg press',repMin:8,repMax:15,step:10},
  {name:'Bulgarian split squat',repMin:8,repMax:12,step:5},
  {name:'Back extension',repMin:10,repMax:20,step:5}
]};

function load(){
  try{data=JSON.parse(localStorage.getItem(DATA_KEY))||[];}catch{data=[];}
  try{const p=JSON.parse(localStorage.getItem(PREF_KEY));prefs=p?{...DEF,...p,lifts:p.lifts||DEF.lifts}:{...DEF,lifts:[...DEF.lifts]};}catch{prefs={...DEF,lifts:[...DEF.lifts]};}
  try{dashLifts=JSON.parse(localStorage.getItem(DASH_KEY))||[];}catch{dashLifts=[];}
  try{dismissed=JSON.parse(localStorage.getItem(DIS_KEY))||[];}catch{dismissed=[];}
}
function save(){localStorage.setItem(DATA_KEY,JSON.stringify(data));}
function saveP(){localStorage.setItem(PREF_KEY,JSON.stringify(prefs));}
function saveD(){localStorage.setItem(DASH_KEY,JSON.stringify(dashLifts));}
function saveDis(){localStorage.setItem(DIS_KEY,JSON.stringify(dismissed));}
function today(){return new Date().toISOString().split('T')[0];}
function getDate(){return document.getElementById('sess-date').value||today();}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

// ── THEME ────────────────────────────────────────────────────
function applyTheme(){
  document.documentElement.setAttribute('data-theme',prefs.theme==='light'?'light':'');
  const t=document.getElementById('theme-tog');if(t)t.className='toggle '+(prefs.theme==='dark'?'on':'off');
  applyAccent();
}
function applyAccent(){
  const a=prefs.accent;
  document.documentElement.style.setProperty('--accent',a);
  const h=a.replace('#','');
  const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  document.documentElement.style.setProperty('--accent-text',lum>0.55?'#0d0d0d':'#ffffff');
  document.documentElement.style.setProperty('--accent-dim',`${a}15`);
  renderSwatches();
}
function toggleTheme(){prefs.theme=prefs.theme==='dark'?'light':'dark';saveP();applyTheme();}
function renderSwatches(){
  const el=document.getElementById('swatches');if(!el)return;
  el.innerHTML=ACCENTS.map(c=>`<div class="swatch${c===prefs.accent?' active':''}" style="background:${c}" onclick="setAccent('${c}')"></div>`).join('');
}
function setAccent(c){prefs.accent=c;saveP();applyAccent();renderGrid();}

// ── LIFT MANAGEMENT (shared between log + settings) ───────────
function getLift(name){return prefs.lifts.find(l=>l.name===name);}

function addLiftFromLog(){
  const inp=document.getElementById('log-new-lift');
  const name=inp.value.trim();
  if(!name){toast('Enter a name');return;}
  if(prefs.lifts.find(l=>l.name.toLowerCase()===name.toLowerCase())){toast('Already exists');return;}
  prefs.lifts.push({name,repMin:6,repMax:12,step:5});
  saveP();inp.value='';
  toggleAddEx();
  renderGrid();renderLiftCfg();toast('Added: '+name);
}

function removeLiftFromLog(name,e){
  e.stopPropagation();
  if(!confirm('Remove '+name+'?'))return;
  prefs.lifts=prefs.lifts.filter(l=>l.name!==name);
  saveP();renderGrid();renderLiftCfg();
  if(activeLift===name)closePanel();
}

function toggleAddEx(){
  const row=document.getElementById('add-ex-row');
  const btn=document.getElementById('add-ex-btn');
  const open=row.style.display==='none'||row.style.display==='';
  row.style.display=open?'block':'none';
  btn.textContent=open?'Cancel':'+ Add';
  if(open)setTimeout(()=>document.getElementById('log-new-lift').focus(),100);
}

function updateLiftCfg(name,key,val){
  const l=getLift(name);if(!l)return;
  l[key]=parseFloat(val)||0;saveP();
}

function removeLiftFromSettings(name){
  if(!confirm('Remove '+name+'?'))return;
  prefs.lifts=prefs.lifts.filter(l=>l.name!==name);
  saveP();renderLiftCfg();renderGrid();
  if(activeLift===name)closePanel();
}

function renderLiftCfg(){
  const el=document.getElementById('lift-cfg-list');if(!el)return;
  if(!prefs.lifts.length){el.innerHTML='<div class="empty" style="padding:1rem 0">No exercises — add from the Log tab</div>';return;}
  el.innerHTML=prefs.lifts.map(l=>`
    <div class="lift-cfg">
      <div class="lift-cfg-head">
        <span class="lift-cfg-name">${l.name}</span>
        <button class="btn xs danger" onclick="removeLiftFromSettings('${l.name.replace(/'/g,"\\'")}')">Remove</button>
      </div>
      <div class="row3">
        <div><label>Min reps</label><input type="number" value="${l.repMin}" min="1" max="50" inputmode="numeric" onchange="updateLiftCfg('${l.name.replace(/'/g,"\\'")}','repMin',this.value)"/></div>
        <div><label>Max reps</label><input type="number" value="${l.repMax}" min="1" max="50" inputmode="numeric" onchange="updateLiftCfg('${l.name.replace(/'/g,"\\'")}','repMax',this.value)"/></div>
        <div><label>Wt step</label><input type="number" value="${l.step}" min="0" max="100" inputmode="decimal" onchange="updateLiftCfg('${l.name.replace(/'/g,"\\'")}','step',this.value)"/></div>
      </div>
    </div>`).join('');
}

// ── NOTIFS ────────────────────────────────────────────────────
function checkNotifs(){
  if(!prefs.notifOn)return[];
  return prefs.lifts.map(l=>{
    const sessions=getLifeSessions(l.name);
    if(sessions.length<prefs.thresh)return null;
    const recent=sessions.slice(-prefs.thresh);
    const key=l.name+'_'+recent[recent.length-1].date;
    if(dismissed.includes(key))return null;
    if(recent.every(s=>Math.max(...s.sets.map(x=>x.reps))>=l.repMax))return{lift:l.name,key};
    return null;
  }).filter(Boolean);
}
function getLifeSessions(lift){
  const byDate={};
  data.filter(s=>s.ex===lift).forEach(s=>{if(!byDate[s.date])byDate[s.date]={date:s.date,sets:[]};byDate[s.date].sets.push(s);});
  return Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
}
function renderNotifs(){
  const bar=document.getElementById('notif-bar');
  const alerts=checkNotifs();
  bar.innerHTML=alerts.map(a=>`<div class="notif">
    <div class="notif-dot"></div>
    <div class="notif-text">Add weight on <span class="notif-lift">${a.lift}</span> — hit rep ceiling ${prefs.thresh}x in a row</div>
    <button class="notif-close" onclick="dismiss('${a.key}')">&#x2715;</button>
  </div>`).join('');
}
function dismiss(key){dismissed.push(key);saveDis();renderNotifs();}
function toggleNotif(){prefs.notifOn=!prefs.notifOn;saveP();const t=document.getElementById('notif-tog');if(t)t.className='toggle '+(prefs.notifOn?'on':'off');renderNotifs();}
function updateThresh(){const v=parseInt(document.getElementById('thresh-range').value);prefs.thresh=v;document.getElementById('thresh-val').textContent=v;saveP();renderNotifs();}

// ── GRID ──────────────────────────────────────────────────────
function getLastSets(lift){
  const cur=getDate();
  const past=data.filter(s=>s.ex===lift&&s.date!==cur).sort((a,b)=>b.date.localeCompare(a.date));
  if(!past.length)return null;
  const ld=past[0].date;
  return data.filter(s=>s.ex===lift&&s.date===ld);
}
function getTodaySets(lift){return data.filter(s=>s.ex===lift&&s.date===getDate());}
function getPR(lift){const s=data.filter(x=>x.ex===lift);if(!s.length)return 0;return Math.max(...s.map(x=>Math.round(x.weight*(1+x.reps/30))));}

function renderGrid(){
  const grid=document.getElementById('ex-grid');
  const alerts=checkNotifs().map(a=>a.lift);
  grid.innerHTML=prefs.lifts.map(l=>{
    const last=getLastSets(l.name);
    const tod=getTodaySets(l.name);
    const pr=getPR(l.name);
    const isAct=activeLift===l.name;
    const hasAlert=alerts.includes(l.name);
    const lastStr=last?`Last: ${last[0].weight}×${last[0].reps}`:'No history';
    const todStr=tod.length?`${tod.length} set${tod.length>1?'s':''} today`:'';
    const todBest=tod.reduce((b,s)=>{const e=Math.round(s.weight*(1+s.reps/30));return e>b?e:b;},0);
    const isPR=todBest>0&&todBest>=pr&&pr>0;
    const cls=['ex-tile',isAct?'is-active':'',hasAlert&&!isAct?'has-notif':''].filter(Boolean).join(' ');
    return `<button class="${cls}" onclick="selectLift('${l.name.replace(/'/g,"\\'")}')">
      ${isPR?'<span class="tile-badge badge-pr">PR</span>':''}
      ${hasAlert&&!isPR?'<span class="tile-badge badge-up">+wt</span>':''}
      <div class="ex-tile-name">${l.name}</div>
      <div class="ex-tile-last">${lastStr}</div>
      ${todStr?`<div class="ex-tile-today">${todStr}</div>`:''}
      <button class="tile-remove" onclick="removeLiftFromLog('${l.name.replace(/'/g,"\\'")}',event)">&#x2715;</button>
    </button>`;
  }).join('');
  if(!prefs.lifts.length)grid.innerHTML='<div class="empty" style="grid-column:1/-1;padding:1.5rem 0">No exercises — tap + Add above</div>';
}

// ── LOG PANEL ─────────────────────────────────────────────────
function selectLift(name){activeLift=name;renderGrid();openPanel(name);}
function openPanel(name){
  const l=getLift(name);
  document.getElementById('log-panel').style.display='block';
  document.getElementById('lp-title').textContent=name;
  document.getElementById('lp-target').textContent=l?`Target: ${l.repMin}–${l.repMax} reps`:'';
  const last=getLastSets(name);
  const lp=document.getElementById('lp-last');
  if(last){
    const str=last.slice(0,5).map((s,i)=>`S${i+1}: <span>${s.weight}×${s.reps}</span>`).join('  ');
    lp.innerHTML=`Last (${last[0].date}):&nbsp; ${str}`;
    if(!document.getElementById('lp-w').value)document.getElementById('lp-w').value=last[0].weight;
  }else{lp.textContent='First time — no history yet';}
  document.getElementById('lp-r').value='';
  renderPanelSets();
  document.getElementById('log-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
  setTimeout(()=>document.getElementById('lp-w').focus(),300);
}
function closePanel(){
  activeLift=null;
  document.getElementById('log-panel').style.display='none';
  document.getElementById('lp-w').value='';
  document.getElementById('lp-r').value='';
  renderGrid();renderSummary();
}
function logSet(){
  const w=parseFloat(document.getElementById('lp-w').value);
  const r=parseInt(document.getElementById('lp-r').value);
  if(!activeLift||isNaN(w)||isNaN(r)){toast('Enter weight and reps');return;}
  data.push({id:Date.now(),date:getDate(),label:document.getElementById('sess-label').value.trim(),ex:activeLift,weight:w,reps:r});
  save();
  document.getElementById('lp-r').value='';
  renderPanelSets();renderGrid();renderSummary();renderNotifs();
  toast('Set logged');
  document.getElementById('lp-r').focus();
}
function renderPanelSets(){
  const sets=getTodaySets(activeLift||'');
  const el=document.getElementById('lp-sets');
  const vol=document.getElementById('lp-vol');
  if(!sets.length){el.innerHTML='';vol.textContent='';return;}
  const l=getLift(activeLift)||{repMin:0,repMax:99};
  el.innerHTML=sets.map((s,i)=>{
    const tag=s.reps>=l.repMax?`<span class="set-tag good">ceiling</span>`:s.reps>=l.repMin?`<span class="set-tag good">in range</span>`:`<span class="set-tag low">below</span>`;
    return `<div class="set-item"><span class="set-n">S${i+1}</span><span class="set-val">${s.weight} lbs × ${s.reps}${tag}</span><button class="set-del" onclick="delSet(${s.id})">&#x2715;</button></div>`;
  }).join('');
  vol.textContent='Volume: '+sets.reduce((a,s)=>a+s.weight*s.reps,0).toLocaleString()+' lbs';
}
function delSet(id){data=data.filter(s=>s.id!==id);save();renderPanelSets();renderGrid();renderSummary();renderNotifs();}

// ── SUMMARY ───────────────────────────────────────────────────
function renderSummary(){
  const el=document.getElementById('sess-summary');
  const sess=data.filter(s=>s.date===getDate());
  if(!sess.length){el.innerHTML='<div class="empty" style="padding:1rem 0">Nothing logged yet</div>';return;}
  const byEx={};
  sess.forEach(s=>{if(!byEx[s.ex])byEx[s.ex]=[];byEx[s.ex].push(s);});
  el.innerHTML=Object.entries(byEx).map(([ex,sets])=>{
    const vol=sets.reduce((a,s)=>a+s.weight*s.reps,0);
    return `<div class="sess-card">
      <div class="sess-ex-head"><span class="sess-ex-name">${ex}</span><span class="sess-sets-ct">${sets.length} set${sets.length>1?'s':''}</span></div>
      ${sets.map((s,i)=>`<div class="sess-set-line">S${i+1}: ${s.weight} lbs × ${s.reps}</div>`).join('')}
      <div class="sess-vol">${vol.toLocaleString()} lbs</div>
    </div>`;
  }).join('');
  updateMeta();
}

// ── PROGRESS ─────────────────────────────────────────────────
function populateDashSelect(){
  const sel=document.getElementById('dash-select');
  sel.innerHTML='<option value="">Add lift to dashboard...</option>'+prefs.lifts.map(l=>`<option value="${l.name}">${l.name}</option>`).join('');
}
function addChart(){
  const v=document.getElementById('dash-select').value;
  if(!v)return;
  if(dashLifts.includes(v)){toast('Already on dashboard');return;}
  dashLifts.push(v);saveD();renderDash();
}
function removeChart(lift){
  dashLifts=dashLifts.filter(l=>l!==lift);saveD();
  if(charts[lift]){charts[lift].destroy();delete charts[lift];}
  renderDash();
}
function setMode(mode,el){
  chartMode=mode;
  document.querySelectorAll('.mode-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderDash();
}
function renderDash(){
  const el=document.getElementById('dash-grid');
  if(!dashLifts.length){el.innerHTML='<div class="empty">Add a lift above to build your dashboard</div>';return;}
  Object.values(charts).forEach(c=>c.destroy());charts={};
  el.innerHTML=dashLifts.map(lift=>{
    const sets=data.filter(s=>s.ex===lift);
    const byDate={};
    sets.forEach(s=>{const e=Math.round(s.weight*(1+s.reps/30));const v=s.weight*s.reps;if(!byDate[s.date])byDate[s.date]={e1rm:e,vol:v};else{if(e>byDate[s.date].e1rm)byDate[s.date].e1rm=e;byDate[s.date].vol+=v;}});
    const sorted=Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0]));
    const best=sorted.reduce((b,[,v])=>v.e1rm>b?v.e1rm:b,0);
    const gain=sorted.length>1?sorted[sorted.length-1][1].e1rm-sorted[0][1].e1rm:0;
    const cid='c_'+lift.replace(/\s/g,'_');
    return `<div class="chart-card">
      <div class="cc-head"><div><div class="cc-title">${lift}</div></div><button class="rm-chart" onclick="removeChart('${lift.replace(/'/g,"\\'")}')">&#x2715;</button></div>
      <div class="cc-sub">${sorted.length} session${sorted.length!==1?'s':''}</div>
      <div class="cc-stats">
        <div class="cc-stat"><div class="cc-stat-label">Best e1RM</div><div class="cc-stat-val">${best}</div></div>
        <div class="cc-stat"><div class="cc-stat-label">Gain</div><div class="cc-stat-val" style="color:${gain>=0?'var(--accent)':'var(--danger)'}">${gain>=0?'+':''}${gain}</div></div>
      </div>
      <canvas id="${cid}" height="150"></canvas>
    </div>`;
  }).join('');
  setTimeout(()=>{
    const dark=document.documentElement.getAttribute('data-theme')!=='light';
    const ac=prefs.accent,mc=dark?'#555550':'#b0ada6',gc=dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)';
    dashLifts.forEach(lift=>{
      const sets=data.filter(s=>s.ex===lift);
      const byDate={};
      sets.forEach(s=>{const e=Math.round(s.weight*(1+s.reps/30));const v=s.weight*s.reps;if(!byDate[s.date])byDate[s.date]={e1rm:e,vol:v};else{if(e>byDate[s.date].e1rm)byDate[s.date].e1rm=e;byDate[s.date].vol+=v;}});
      const sorted=Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0]));
      const labels=sorted.map(([d])=>d);
      const vals=sorted.map(([,v])=>chartMode==='e1rm'?v.e1rm:Math.round(v.vol));
      const cvs=document.getElementById('c_'+lift.replace(/\s/g,'_'));if(!cvs)return;
      charts[lift]=new Chart(cvs,{
        type:'line',
        data:{labels,datasets:[{data:vals,borderColor:ac,backgroundColor:ac+'12',borderWidth:1.5,pointBackgroundColor:ac,pointRadius:labels.length>15?0:3,fill:true,tension:0.35}]},
        options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.y}${chartMode==='e1rm'?' lbs e1RM':' lbs vol'}`}}},scales:{x:{ticks:{color:mc,font:{family:'DM Mono',size:10},maxTicksLimit:5},grid:{color:gc}},y:{ticks:{color:mc,font:{family:'DM Mono',size:10}},grid:{color:gc}}}}
      });
    });
  },50);
}

// ── STATS ─────────────────────────────────────────────────────
function setCat(cat,el){
  currentCat=cat;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderStats();
}
function renderStats(){
  const el=document.getElementById('stats-view');
  const catLifts=currentCat==='all'?prefs.lifts.map(l=>l.name):(CATS[currentCat]||[]);
  const rows=catLifts.map(name=>{
    const sets=data.filter(s=>s.ex===name);if(!sets.length)return null;
    const byDate={};sets.forEach(s=>{const e=Math.round(s.weight*(1+s.reps/30));if(!byDate[s.date]||e>byDate[s.date])byDate[s.date]=e;});
    const sorted=Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0]));
    const best=Math.max(...sorted.map(([,e])=>e));
    const gain=sorted.length>1?sorted[sorted.length-1][1]-sorted[0][1]:0;
    return{name,best,gain,sessions:sorted.length};
  }).filter(Boolean);
  if(!rows.length){el.innerHTML='<div class="empty">No data for this category</div>';return;}
  el.innerHTML=`<table class="stat-table"><thead><tr><th>Lift</th><th>e1RM</th><th>Gain</th><th>Sess</th></tr></thead><tbody>`+
    rows.map(r=>`<tr><td class="td-lift">${r.name}</td><td class="td-e1rm">${r.best}</td><td class="td-gain ${r.gain>=0?'pos':'neg'}">${r.gain>=0?'+':''}${r.gain}</td><td class="td-sess">${r.sessions}</td></tr>`).join('')+
    `</tbody></table>`;
}

// ── NAV ───────────────────────────────────────────────────────
function goTo(name,el){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('scr-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='progress'){populateDashSelect();renderDash();}
  if(name==='stats')renderStats();
  if(name==='settings')renderSettings();
}
function renderSettings(){
  const tt=document.getElementById('theme-tog');if(tt)tt.className='toggle '+(prefs.theme==='dark'?'on':'off');
  const nt=document.getElementById('notif-tog');if(nt)nt.className='toggle '+(prefs.notifOn?'on':'off');
  const tr=document.getElementById('thresh-range');if(tr){tr.value=prefs.thresh;document.getElementById('thresh-val').textContent=prefs.thresh;}
  renderSwatches();renderLiftCfg();
}

// ── META + EXPORT ─────────────────────────────────────────────
function updateMeta(){
  const sessions=new Set(data.map(s=>s.date)).size;
  document.getElementById('hdr-meta').textContent=`${data.length} sets · ${sessions} sessions`;
}
function exportCSV(){
  if(!data.length){toast('No data yet');return;}
  const rows=data.map(s=>[s.date,`"${(s.label||'').replace(/"/g,'""')}"`,`"${s.ex.replace(/"/g,'""')}"`,s.weight,s.reps].join(','));
  const csv=['date,session_label,exercise,weight_lbs,reps',...rows].join('\n');
  const url=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  const a=document.createElement('a');a.href=url;a.download=`liftlog_${today()}.csv`;a.click();URL.revokeObjectURL(url);
  toast('Exported');
}
function clearData(){
  if(!confirm('Delete all data? This cannot be undone.'))return;
  data=[];save();renderGrid();renderSummary();renderNotifs();updateMeta();toast('Cleared');
}

// ── INIT ──────────────────────────────────────────────────────
load();applyTheme();
document.getElementById('sess-date').value=today();
renderGrid();renderSummary();renderNotifs();updateMeta();
</script>
</body>
</html>
